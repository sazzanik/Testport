<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | Sazzad Zaman Anik</title>
  <meta name="description" content="Thank you page for contact form submission.">
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://sazzadanik.pro/thank-you.html">
  <meta property="og:title" content="Thank You | Sazzad Zaman Anik">
  <meta property="og:description" content="Your message has been submitted successfully.">
  <meta property="og:url" content="https://sazzadanik.pro/thank-you.html">
<style>
    :root{--ocean:#0d63d6;--sea:#12b8c8;--navy:#0b2340;--muted:#5e7896;--line:rgba(16,52,101,.10);--shadow:0 18px 50px rgba(13,65,145,.10)}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;color:var(--navy);background:radial-gradient(50rem 50rem at 0% 0%,rgba(53,166,255,.12),transparent 35%),radial-gradient(42rem 42rem at 100% 0%,rgba(18,184,200,.12),transparent 30%),linear-gradient(180deg,#f7fbff 0%,#edf5ff 100%);padding:24px}
    .card{width:min(620px,100%);background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);padding:36px;text-align:center}
    .mark{width:72px;height:72px;border-radius:24px;margin:0 auto 18px;display:grid;place-items:center;color:#fff;font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--ocean),var(--sea));box-shadow:0 14px 30px rgba(13,99,214,.22)}
    h1{margin:0 0 12px;font-size:clamp(2rem,5vw,3rem);letter-spacing:-.045em;line-height:1.05}
    p{margin:0 auto 24px;max-width:48ch;color:var(--muted);line-height:1.8}
    a{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:14px 18px;border-radius:18px;color:#fff;text-decoration:none;font-weight:800;background:linear-gradient(135deg,var(--ocean),var(--sea));box-shadow:0 12px 28px rgba(13,99,214,.22)}
  </style>
</head>
<body>
  <main class="card">
    <div class="mark">✓</div>
    <h1>Thank you for reaching out.</h1>
    <p>Your message has been submitted successfully. I will review your inquiry and respond as soon as possible.</p>
    <a href="/">Back to Portfolio</a>
  </main>
</body>
</html>
